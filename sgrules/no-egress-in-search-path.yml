# No PHI egress from the cited-search path (ratchet BP-035).
# BF-06's security floor: in the default config, search performs ZERO external
# embedding/rerank calls — the dev embedder is node:crypto feature-hashing and a
# real embedder is a SELF-HOSTED, in-process/on-box model. Any egress vector under
# packages/core/src/search/** would ship PHI (the query text) off-box: a network
# client, a hosted-model API SDK, a raw node network core module (net/tls/dns/
# dgram/http2/child_process — these ALSO evade a globalThis.fetch runtime spy), or
# a fetch/WebSocket/EventSource call — via static import, require, OR dynamic
# import(). Banned outright — the structural control behind bf06-no-phi-egress.
# NOTE: local in-process inference libs (onnxruntime-node, @xenova/transformers)
# are NOT banned — they are the ALLOWED self-hosted path. Tests are exempt (they
# spy to PROVE the invariant). A repo-wide default-deny + a sibling-helper scope
# (packages/core/src/**) is a documented BP-035 follow-up.
id: no-egress-in-search-path
language: TypeScript
severity: error
message: Network/hosted-model egress in the cited-search path — search must make no off-box call in the default config (PHI egress).
note: |
  Cited search embeds/ranks with a self-hosted, in-process model (the v0 dev
  embedder is node:crypto only). Under packages/core/src/search do not import
  (static/require/dynamic) node:http|https|net|tls|dns|dgram|http2|child_process,
  undici/axios/got/node-fetch, or a hosted embedding/LLM SDK (openai, cohere-ai,
  @anthropic-ai/sdk, @google/generative-ai, @huggingface/inference, replicate),
  and do not call fetch()/globalThis.fetch()/new WebSocket()/new EventSource().
  Run the model on-box (onnxruntime-node / @xenova/transformers) instead.
metadata:
  slop-pattern: phi-egress-search-path
  gate-stage: 1
  ratchet: BP-035
files:
  - "packages/core/src/search/**"
ignores:
  - "**/*.test.ts"
rule:
  any:
    # --- static imports of every banned module ---
    - pattern: import $$$X from "node:http"
    - pattern: import $$$X from "node:https"
    - pattern: import $$$X from "node:net"
    - pattern: import $$$X from "node:tls"
    - pattern: import $$$X from "node:dns"
    - pattern: import $$$X from "node:dgram"
    - pattern: import $$$X from "node:http2"
    - pattern: import $$$X from "node:child_process"
    - pattern: import $$$X from "undici"
    - pattern: import $$$X from "axios"
    - pattern: import $$$X from "got"
    - pattern: import $$$X from "node-fetch"
    - pattern: import $$$X from "openai"
    - pattern: import $$$X from "cohere-ai"
    - pattern: import $$$X from "@anthropic-ai/sdk"
    - pattern: import $$$X from "@google/generative-ai"
    - pattern: import $$$X from "@huggingface/inference"
    - pattern: import $$$X from "replicate"
    # --- require() of every banned module ---
    - pattern: require("node:http")
    - pattern: require("node:https")
    - pattern: require("node:net")
    - pattern: require("node:tls")
    - pattern: require("node:dns")
    - pattern: require("node:dgram")
    - pattern: require("node:http2")
    - pattern: require("node:child_process")
    - pattern: require("undici")
    - pattern: require("axios")
    - pattern: require("got")
    - pattern: require("node-fetch")
    - pattern: require("openai")
    - pattern: require("cohere-ai")
    - pattern: require("@anthropic-ai/sdk")
    - pattern: require("@google/generative-ai")
    - pattern: require("@huggingface/inference")
    - pattern: require("replicate")
    # --- dynamic import() of every banned module ---
    - pattern: import("node:http")
    - pattern: import("node:https")
    - pattern: import("node:net")
    - pattern: import("node:tls")
    - pattern: import("node:dns")
    - pattern: import("node:dgram")
    - pattern: import("node:http2")
    - pattern: import("node:child_process")
    - pattern: import("undici")
    - pattern: import("axios")
    - pattern: import("got")
    - pattern: import("node-fetch")
    - pattern: import("openai")
    - pattern: import("cohere-ai")
    - pattern: import("@anthropic-ai/sdk")
    - pattern: import("@google/generative-ai")
    - pattern: import("@huggingface/inference")
    - pattern: import("replicate")
    # --- network call sinks ---
    - pattern: fetch($$$ARGS)
    - pattern: globalThis.fetch($$$ARGS)
    - pattern: new WebSocket($$$ARGS)
    - pattern: new EventSource($$$ARGS)
