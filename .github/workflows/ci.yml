name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref (newest wins) so parallel pushes do not
# pile up — but never cancel a verification run on main, where every commit to the
# production branch must be fully verified.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege: CI only reads the repository. No auto-merge, no deploy, no PR
# writes — a human gates every mutation (loop-harness-plan.md, A4).
permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

jobs:
  # ---------------------------------------------------------------------------
  # BLOCKING — deterministic gate stack, run through turbo on AFFECTED packages.
  # tsc -b (typecheck), eslint strict (lint), tests, and build must all pass.
  # ---------------------------------------------------------------------------
  gate:
    name: gate / ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [typecheck, lint, test, build]
    env:
      TURBO_CACHE_DIR: .turbo
    steps:
      - name: Checkout (full history for affected detection)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ matrix.task }}-
      - name: Run ${{ matrix.task }}
        env:
          TASK: ${{ matrix.task }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_REF:-}" ]; then
            git fetch --no-tags --quiet origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            echo "::group::turbo run ${TASK} — affected since origin/${BASE_REF}"
            bunx turbo run "${TASK}" --filter="...[origin/${BASE_REF}]" --cache-dir=.turbo
            echo "::endgroup::"
          else
            echo "::group::turbo run ${TASK} — full run (non-PR event)"
            bunx turbo run "${TASK}" --cache-dir=.turbo
            echo "::endgroup::"
          fi

  # ---------------------------------------------------------------------------
  # BLOCKING — static analysis (Semgrep). Curated low-noise baseline plus any
  # repo-local rules; a finding fails the build.
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.168.0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Semgrep scan
        shell: sh
        run: |
          set -eu
          CONFIGS="--config p/default"
          if [ -d .semgrep ]; then CONFIGS="$CONFIGS --config .semgrep"; fi
          if [ -f semgrep.yml ]; then CONFIGS="$CONFIGS --config semgrep.yml"; fi
          if [ -f .semgrep.yml ]; then CONFIGS="$CONFIGS --config .semgrep.yml"; fi
          # Word-splitting on $CONFIGS is intentional (multiple --config flags).
          semgrep scan $CONFIGS \
            --error \
            --metrics off \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .turbo \
            --exclude coverage

  # ---------------------------------------------------------------------------
  # BLOCKING — secret scanning (gitleaks CLI, pinned + checksum-verified). Run as
  # the raw binary (not the action) so it stays license-free under an org account.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          rm -f gitleaks.tar.gz
      - name: Scan working tree for secrets
        run: ./gitleaks dir . --redact --no-banner --exit-code 1
      - name: Scan git history for secrets
        run: ./gitleaks git . --redact --no-banner --exit-code 1

  # ---------------------------------------------------------------------------
  # ADVISORY (Phase-1 bring-up) — these report but never block. They graduate to
  # BLOCKING by the end of Phase 2 (loop-harness-plan.md, T6).
  # ---------------------------------------------------------------------------
  advisory:
    name: advisory / ${{ matrix.tool }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        tool: [knip, jscpd, dependency-cruiser]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ${{ matrix.tool }}
        env:
          TOOL: ${{ matrix.tool }}
        run: |
          set -eu
          case "$TOOL" in
            knip)
              bunx knip
              ;;
            jscpd)
              bunx jscpd . --ignore "**/node_modules/**,**/dist/**,**/build/**,**/.turbo/**,**/coverage/**"
              ;;
            dependency-cruiser)
              DIRS=""
              for d in loop packages apps; do
                [ -d "$d" ] && DIRS="$DIRS $d"
              done
              if [ -z "$DIRS" ]; then
                echo "No source directories present yet; nothing to cruise."
                exit 0
              fi
              bunx depcruise $DIRS
              ;;
          esac
