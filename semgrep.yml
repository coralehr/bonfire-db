# Bonfire DB — Semgrep security gate
#
# Static-analysis gate for AI-authored code. Targets the OWASP Top 10 patterns
# that autonomous coding agents reproduce most often (injection, broken access
# control / fail-open authorization, hardcoded secrets) plus two Bonfire-specific
# healthcare rules:
#   * no raw SQL built by string concatenation in MCP / tool / product code
#   * authorization must be deny-by-default (no allow-by-default shape)
#
# Versions verified 2026-06-26: semgrep 1.168.0.
#
# CI (blocking gate; inline // nosemgrep is blocked by the static/suppressions gate):
#   pip install semgrep==1.168.0
#   semgrep scan --config semgrep.yml --error --strict --metrics=off .
#
# Severity is ERROR across the board: this is a gate, not advisory. Every rule is
# either path-scoped or identifier-anchored to keep false positives near zero.

rules:
  # --------------------------------------------------------------------------
  # A03:2021 Injection — SQL built by concatenation/interpolation into a sink.
  # --------------------------------------------------------------------------
  - id: bonfire-sql-injection-string-build
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Possible SQL injection: a query is built with string concatenation or
      template interpolation and handed to a database execution sink. Use
      parameterized queries ($1, $2, ...) or the Drizzle / postgres.js `sql`
      tagged template so values are bound, never inlined into the statement text.
    metadata:
      category: security
      subcategory: [vuln]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp:
        - "A03:2021 - Injection"
      references:
        - https://owasp.org/Top10/A03_2021-Injection/
        - https://orm.drizzle.team/docs/sql
    patterns:
      - pattern-either:
          - pattern: $SINK.query(`...${...}...`)
          - pattern: $SINK.query($A + ...)
          - pattern: $SINK.execute(`...${...}...`)
          - pattern: $SINK.execute($A + ...)
          - pattern: $SINK.unsafe(`...${...}...`)
          - pattern: $SINK.unsafe($A + ...)
          - pattern: $SINK.raw(`...${...}...`)
          - pattern: $SINK.raw($A + ...)
    paths:
      exclude:
        # The behaviour corpus contains deliberately-bad code, annotated and
        # enforced by `semgrep scan --test sgrule-tests/semgrep` instead.
        - "sgrule-tests/semgrep/**"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mjs"
        - "**/*.test.js"
        - "**/*.spec.ts"
        - "**/*.spec.tsx"

  # --------------------------------------------------------------------------
  # A01:2021 Broken Access Control — FAIL-OPEN is enforced STRUCTURALLY by the
  # ast-grep rule `no-fail-open-auth` (sgrules/, TS-native via tree-sitter, unit
  # tested, run in the `static / structural` gate). semgrep's JS pattern engine
  # cannot parse the `catch (...)` shapes those rules needed, so fail-open
  # detection lives in ast-grep, not here. Deny-by-default is still checked below.
  # --------------------------------------------------------------------------

  # --------------------------------------------------------------------------
  # A07:2021 Identification & Authentication Failures / A05 Misconfiguration —
  # Hardcoded secret assigned to a sensitive identifier.
  # --------------------------------------------------------------------------
  - id: bonfire-hardcoded-secret
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Hardcoded secret: a credential-shaped identifier is assigned a string
      literal. Load secrets from the environment (process.env / a secret manager),
      never commit them. (gitleaks scans the rest of the tree.)
    metadata:
      category: security
      subcategory: [vuln]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      references:
        - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
        - https://cwe.mitre.org/data/definitions/798.html
    patterns:
      - pattern-either:
          - pattern: const $NAME = "$VAL"
          - pattern: let $NAME = "$VAL"
          - pattern: var $NAME = "$VAL"
          - pattern: $NAME = "$VAL"
          - pattern: $OBJ.$NAME = "$VAL"
          - pattern: "{ ..., $NAME: \"$VAL\", ... }"
      - metavariable-regex:
          metavariable: $NAME
          regex: '(?i)^.*(password|passwd|pwd|secret|apikey|api_key|access_key|secret_key|client_secret|token|auth_token|private_key|encryption_key|signing_key|session_secret|jwt_secret|credential|passphrase)$'
      - metavariable-regex:
          metavariable: $VAL
          regex: '^(?!.*(\$\{|process\.env|import\.meta\.env|example|placeholder|changeme|your[-_ ]|redacted|dummy|sample|fixme|todo|<[^>]+>|xxxx+|\*{3,}|\.{3,})).{8,}$'
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mjs"
        - "**/*.test.js"
        - "**/*.spec.ts"

  # --------------------------------------------------------------------------
  # A07:2021 — Private key material committed in source.
  # --------------------------------------------------------------------------
  - id: bonfire-private-key-in-source
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Private key material in source. Never embed PEM/OpenSSH private keys in
      code. Move to a secret manager and rotate the exposed key immediately.
    metadata:
      category: security
      subcategory: [vuln]
      confidence: HIGH
      likelihood: LOW
      impact: HIGH
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      references:
        - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
    patterns:
      - pattern-regex: '-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'

  # --------------------------------------------------------------------------
  # HEALTHCARE CUSTOM RULE 1 — No raw SQL built by string concatenation in
  # MCP / tool / product code. AGENTS.md forbids exposing a raw-SQL tool through
  # the Bonfire product surface; this enforces it at the call site. Seed and
  # migration dev scripts (scripts/**, seed/**, drizzle/**) are intentionally
  # out of scope — they build synthetic SQL behind escaping helpers, not tools.
  # --------------------------------------------------------------------------
  - id: bonfire-mcp-tool-raw-sql-concat
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Raw SQL assembled by string concatenation/interpolation in MCP/tool/product
      code. No raw-SQL tool may be exposed on the Bonfire product surface, and all
      data access must be parameterized. Use the Drizzle query builder or the `sql`
      tagged template (bound params) instead of building statement text by hand.
      Templates tagged exactly `sql` are exempt: postgres.js/Drizzle bind their
      interpolations as parameters (ratchet BP-011 — the untagged-template clause
      previously flagged the safe idiom and pushed code toward sql.unsafe).
    metadata:
      category: security
      subcategory: [vuln]
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp:
        - "A03:2021 - Injection"
      references:
        - https://orm.drizzle.team/docs/sql
        - https://modelcontextprotocol.io/docs/concepts/tools
    patterns:
      - pattern-either:
          - patterns:
              - pattern: $L + $R
              - metavariable-regex:
                  metavariable: $L
                  regex: '(?i)["''`]\s*(select\s|insert\s+into\s|update\s|delete\s+from\s|drop\s+table\s|alter\s+table\s|truncate\s|create\s+table\s|merge\s+into\s|union\s+select\s)'
          - patterns:
              - pattern: $L + $R
              - metavariable-regex:
                  metavariable: $R
                  regex: '(?i)["''`]\s*(select\s|insert\s+into\s|update\s|delete\s+from\s|drop\s+table\s|alter\s+table\s|truncate\s|create\s+table\s|merge\s+into\s|union\s+select\s)'
          # Untagged template literal that both LOOKS like a SQL statement and
          # interpolates. The lookbehind branches exempt the ONE sanctioned tag
          # — a template opened by a standalone `sql` identifier (postgres.js /
          # Drizzle: interpolations become bound parameters): a backtick either
          # NOT preceded by `sql`, or preceded by a `mysql`/`rawsql`-style
          # near-miss ([\w$]sql), is still flagged. Keywords are anchored to
          # statement shapes (select ... / insert into ... / delete from ...)
          # so prose like "row shape from ${x}" in error messages cannot match;
          # sql.unsafe with interpolation is still caught by
          # bonfire-sql-injection-string-build above. (Ratchet BP-011.)
          - pattern-regex: '(?i)(?:(?<!sql)|(?<=[\w$]sql))`[^`]*\b(select|insert\s+into|update\s+\S+\s+set|delete\s+from|drop\s+table|alter\s+table|truncate\s+table|create\s+table|merge\s+into|union\s+select)\s[^`]*\$\{[^`]*`'
    paths:
      include:
        - "packages/core/**"
        - "packages/mcp/**"
        - "packages/sdk/**"
        - "apps/api/**"
        - "apps/demo/**"
        - "**/mcp/**"
        - "**/tools/**"
        - "**/tool/**"
        - "**/*tool*.ts"
        - "**/*tool*.tsx"
      exclude:
        - "scripts/**"
        - "seed/**"
        - "drizzle/**"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mjs"
        - "**/*.test.js"
        - "**/*.spec.ts"

  # --------------------------------------------------------------------------
  # RATCHET BP-015 — a value interpolated into a jsonb cast double-encodes.
  # postgres.js binds an interpolated string with the jsonb parameter type, so
  # `${anything}::jsonb` (or the CAST(... AS jsonb) spelling) over a serialized
  # value stores a jsonb STRING SCALAR, not a document (live probe: jsonb_typeof
  # = 'string'). The refutation panel showed the original inline-JSON.stringify
  # regex was evaded by extracting the stringify to a local (`${s}::jsonb`) or
  # by the CAST spelling, so this now flags EVERY interpolated jsonb cast and
  # carves out only the sanctioned `sql.json(...)` form.
  # --------------------------------------------------------------------------
  - id: bonfire-jsonb-stringify-double-encode
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      A value interpolated into a jsonb cast (`${...}::jsonb` or
      `CAST(${...} AS jsonb)`) double-encodes: postgres.js binds it as text and
      the cast wraps it as a jsonb string scalar, not a document. Use
      sql.json(value) — it binds the value as a real jsonb object. (Ratchet
      BP-015; the jsonb_typeof guard test asserts the stored shape.)
    metadata:
      category: correctness
      subcategory: [vuln]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      ratchet: BP-015
      references:
        - https://github.com/porsager/postgres#json
    patterns:
      # Any interpolation immediately cast to jsonb, in either spelling. The
      # not-regex exempts the sanctioned sql.json(...) form so `${sql.json(x)}`
      # (which is never cast) and a rare `${sql.json(x)}::jsonb` both pass.
      - pattern-either:
          - pattern-regex: '\$\{[^}`]*\}\s*::\s*jsonb'
          - pattern-regex: '(?i)\bcast\s*\(\s*\$\{[^}`]*\}\s+as\s+jsonb\s*\)'
      - pattern-not-regex: '\$\{[^}`]*\bsql\.json\b'
    paths:
      exclude:
        # Deliberately-bad corpus lines live under the --test harness instead.
        - "sgrule-tests/semgrep/**"

  # --------------------------------------------------------------------------
  # HEALTHCARE CUSTOM RULE 2 — Authorization must be DENY-BY-DEFAULT. Flags the
  # allow-by-default shape (a mutable decision initialized to allow/true that
  # later gets flipped to deny), which fails open whenever a check is skipped.
  # The safe Bonfire shape derives the decision from an explicit conjunction of
  # checks, e.g. `const decision = checks.every(c => c.passed) ? "allow" : "deny"`.
  # --------------------------------------------------------------------------
  - id: bonfire-authz-allow-by-default
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Allow-by-default authorization. A decision variable is initialized to
      allow/true and presumably narrowed later — this fails open if any check is
      skipped or throws. Authorization must be deny-by-default: start from deny
      and require an explicit conjunction of checks to reach allow.
    metadata:
      category: security
      subcategory: [vuln]
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      cwe:
        - "CWE-1188: Insecure Default Initialization of Resource"
        - "CWE-285: Improper Authorization"
      owasp:
        - "A01:2021 - Broken Access Control"
      references:
        - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
        - https://cwe.mitre.org/data/definitions/636.html
    patterns:
      - pattern-either:
          - pattern: let $V = true
          - pattern: var $V = true
          - pattern: 'let $V: $T = true'
          - pattern: let $V = "allow"
          - pattern: var $V = "allow"
      - metavariable-regex:
          metavariable: $V
          regex: '(?i)^(allow|allowed|allows|authorize|authorized|authz|granted|grant|permit|permitted|access|isallowed|canaccess|hasaccess|isauthorized|ispermitted|decision|verdict)$'
    paths:
      include:
        - "packages/core/**"
        - "packages/mcp/**"
        - "packages/sdk/**"
        - "apps/api/**"
        - "**/abac*"
        - "**/authz*"
        - "**/auth/**"
        - "**/policy*"
        - "**/policies/**"
        - "**/access*"
        - "**/guard*"
        - "**/permission*"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mjs"
        - "**/*.test.js"
        - "**/*.spec.ts"

  # --------------------------------------------------------------------------
  # RATCHET BP-005 — a SESSION-level app.* GUC bleeds across pooled connections.
  # The tenant scope (app.current_practice_id) MUST be set transaction-locally,
  # so that when the connection returns to the pool the GUC is already gone. Two
  # spellings set it for the whole SESSION and survive into the next request
  # that reuses the same physical connection — a silent cross-tenant read:
  #   * set_config('app.<x>', <v>, false)  — the third arg `false` = not-local
  #   * SET app.<x> = ...  /  SET SESSION app.<x> ...  — session by default
  # The ONLY sanctioned form is set_config('app.<x>', <v>, true) (withTenant) or
  # the equivalent SET LOCAL app.<x> — both scoped to the open transaction; the
  # `true` / `LOCAL` branches are deliberately NOT matched. This is BF-13
  # acceptance #5 made structural: the by-hand tenant GUC can never outlive its
  # transaction on the max:1 pool.
  # --------------------------------------------------------------------------
  - id: bonfire-session-set-app-guc
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Session-level app.* GUC set: this tenant scope survives past the
      transaction and bleeds into the next request that reuses the pooled
      connection (BP-005 cross-tenant read). Set it transaction-locally instead:
      set_config('app.current_practice_id', <value>, true) or SET LOCAL. Never
      pass `false` to set_config for an app.* GUC and never use a bare/SESSION
      SET for one.
    metadata:
      category: security
      subcategory: [vuln]
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      cwe:
        - "CWE-488: Exposure of Data Element to Wrong Session"
        - "CWE-285: Improper Authorization"
      owasp:
        - "A01:2021 - Broken Access Control"
      references:
        - https://www.postgresql.org/docs/current/functions-admin.html#FUNCTIONS-ADMIN-SET
    patterns:
      - pattern-either:
          # set_config for an app.* GUC whose is_local arg is literally false.
          - pattern-regex: '(?i)set_config\s*\(\s*([''"`])app\.[^''"`]*\1\s*,[^,)]*,\s*false\s*\)'
          # Bare or SESSION SET of an app.* GUC. SET LOCAL app.* is NOT matched
          # (after `set ` the next word is `local`, not the optional `session`).
          - pattern-regex: '(?i)\bset\s+(?:session\s+)?app\.[a-z0-9_.]+\s*(?:=|to\b)'
    paths:
      include:
        - "packages/**"
        - "apps/**"
        - "scripts/**"
        - "seed/**"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mjs"
        - "**/*.test.js"
        - "**/*.spec.ts"
